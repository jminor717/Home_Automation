
substitutions:
  device_name: annealing-oven
  friendly_name: Annealing Oven
  left_ntc_pin: GPIO0
  right_ntc_pin: GPIO1
  bottom_ntc_pin: GPIO2
  left_heater_pin: GPIO21
  right_heater_pin: GPIO22
  bottom_heater_pin: GPIO23

#  esphome logs .\Devices\annealing_oven.yml --no-states

external_components:
  - source:
      type: local
      path: ../my_components # path relative to Devices folder

esphome:
    name: $device_name
    friendly_name: $friendly_name
    on_boot:
        priority: -10
        then:
            # Enable external antenna by default (FM8625H RF switch)
            - output.turn_off: rf_switch_enable    # LOW -> RF switch power ON
            - output.turn_off: rf_antenna_select    # HIGH -> external antenna (U.FL) turn_on

esp32:
    variant: esp32c6
    board: seeed_xiao_esp32c6
    framework:
        type: esp-idf
        sdkconfig_options:
            CONFIG_SOC_WIFI_HE_SUPPORT: y
            CONFIG_ESP_WIFI_11AX_SUPPORT: y

preferences:
  # the default of 1min is far too short--flash chip is rated for approx 100k writes. 
  flash_write_interval: "480h"

api:
  # password: ""
ota:
  platform: esphome
  password: ""

logger:
  level: INFO
  logs:
    sensor: WARN
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "$device_name AP"
    password: "BiSG9yrKP394" 
captive_portal:

time:
  - platform: homeassistant
    id: sntp_time

json:
# initial_value: "{0}"
globals:
  - { id: profile_times, type: "float[12]" }
  - { id: profile_temps, type: "float[12]" } 
  - { id: profile_points, type: "int32_t", initial_value: "-1" }
  - { id: running_profile, type: bool, initial_value: "false" }
  - { id: run_start_time, type: "uint32_t", initial_value: "1" }
  - { id: run_index, type: "int32_t", initial_value: "-1" }

button:
  - platform: restart
    name: "$device_name Restart"
  - platform: template
    name: "PID Left Autotune"
    on_press:
      - climate.pid.autotune: pid_left
  - platform: template
    name: "PID Right Autotune"
    on_press:
      - climate.pid.autotune: pid_right
  - platform: template
    name: "PID Bottom Autotune"
    on_press:
      - climate.pid.autotune: pid_bottom
  - platform: template
    name: "preheat oven"
    id: preheat_oven
    on_press:
      then:
        - script.execute: load_profile_from_sensor
        - lambda: |-
            if(id(profile_points) > 0){
              ESP_LOGI("preheat", "preheating to first setpoint: %.2f°C", id(profile_temps)[0]);

              id(pid_left).make_call().set_target_temperature(id(profile_temps)[0]).perform();
              id(pid_right).make_call().set_target_temperature(id(profile_temps)[0]).perform();
              id(pid_bottom).make_call().set_target_temperature(id(profile_temps)[0]).perform();
            }else{
              ESP_LOGE("preheat", "no setpoints loaded, cannot preheat");
            }
  - platform: template
    name: "run profile"
    id: run_profile
    on_press:
      then:
        - lambda: |-
            if(id(profile_points) > 0){
              auto time = id(sntp_time).now().timestamp;
              id(run_start_time) = time;
              id(run_index) = 0;
              id(running_profile) = true;
              

            }else{
              ESP_LOGE("preheat", "no setpoints loaded, cannot preheat");
            }
  - platform: template
    name: "parse reflow profile"
    id: load_profile
    on_press:
      then:
        - script.execute: load_profile_from_sensor

interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return id(running_profile);'
          then:
            - script.execute: run_reflow_profile

script:
- id: run_reflow_profile
  mode: restart
  then:
    - lambda: |-
          auto time = id(sntp_time).now().timestamp;
          auto elapsed = (time - id(run_start_time));
          
          auto localIndex = id(run_index);
          if(id(profile_times)[localIndex+1] <= elapsed){
            localIndex++;
            id(run_index) = localIndex;
          }

            if(localIndex >= (id(profile_points) - 1)){
              ESP_LOGI("run_profile", "profile complete, stopping");
              id(running_profile) = false;
              return;
            }

          auto prior_temp = id(profile_temps)[localIndex];
          auto next_temp = id(profile_temps)[localIndex + 1];
          auto prior_time = id(profile_times)[localIndex];
          auto next_time = id(profile_times)[localIndex + 1];

          auto delta = elapsed - prior_time;
          auto time_delta = next_time - prior_time;
          auto temp_delta = next_temp - prior_temp;
          auto interpolated_temp = prior_temp + (temp_delta * delta / time_delta);
          
          ESP_LOGI("run_profile", "point: %ld|%ld, delta: %.2f, elapsed %lld, prior: %.2f, next: %.2f, inter: %.2f", 
                          localIndex, id(profile_points)-1, delta, elapsed, prior_temp, next_temp, interpolated_temp);
          id(pid_left).make_call().set_target_temperature(interpolated_temp).perform();
          id(pid_right).make_call().set_target_temperature(interpolated_temp).perform();
          id(pid_bottom).make_call().set_target_temperature(interpolated_temp).perform();




- id: load_profile_from_sensor
  mode: restart
  then:
    - lambda: |-
          ESP_LOGI("parse", "Parsing reflow profile json from Home Assistant, %s", id(profile).state.c_str());
          json::parse_json(id(profile).state, [](JsonObject root) -> bool {
            if (root["profileName"].is<const char *>()) {
              const char * ver_str = root["profileName"].as<const char *>();
              ESP_LOGI("parse", "got setpoint named: %s", ver_str);
            }
            if (!root["setpoints"].is<JsonArray>()) { return {}; } // ESP_LOGE("parse", "setpoints is not an array");
            JsonArray setpoints = root["setpoints"].as<JsonArray>();
            if (setpoints.size() == 0) { ESP_LOGE("parse", "setpoints array is empty"); return {}; }

            id(profile_points) = setpoints.size();

            int counter=0;
            for (JsonObject entry : setpoints) {
              if(!entry["time"].is<float>() || !entry["temp"].is<float>()) { ESP_LOGE("parse", "setpoint entry is missing time or temp"); return {}; }
              
              float time = entry["time"].as<float>();
              float temp = entry["temp"].as<float>();
              ESP_LOGI("parse", "setpoint %d of %d: time=%.2f, temp=%.2f", counter + 1, setpoints.size(), time, temp);
              id(profile_times)[counter] = time;
              id(profile_temps)[counter] = temp;
              counter++;
            }
            return {};
          });



text_sensor:
  - platform: version
    name: "$device_name Version"
  - platform: homeassistant
    id: profile
    entity_id: sensor.active_temp_profile
    attribute: stateAttribute
    # name: "Annealing Oven active Profile"
    # internal: false



switch:
  - platform: template
    name: "External Antenna"
    optimistic: true
    restore_mode: ALWAYS_ON
    turn_on_action:
        - output.turn_off: rf_switch_enable    # LOW -> RF switch power ON
        - output.turn_on: rf_antenna_select    # HIGH -> external antenna (U.FL/RF2)
    turn_off_action:
        - output.turn_off: rf_switch_enable    # LOW -> RF switch power ON
        - output.turn_off: rf_antenna_select   # LOW -> internal antenna (PCB/RF1)




# External antenna control using ESPHome 2025.12+ board aliases (FM8625H RF switch)
# RF_SWITCH_EN (GPIO3) = RF switch power, RF_ANT_SELECT (GPIO14) = antenna selector
output:
  - platform: gpio
    id: rf_switch_enable
    pin: RF_SWITCH_EN

  - platform: gpio
    id: rf_antenna_select
    pin: RF_ANT_SELECT
  - { platform: ledc, pin: $left_heater_pin, id: heater_left, frequency: 1220Hz}
  - { platform: ledc, pin: $right_heater_pin, id: heater_right, frequency: 1220Hz}
  - { platform: ledc, pin: $bottom_heater_pin, id: heater_bottom, frequency: 1220Hz}




# Example configuration entry
sensor:
  - { platform: uptime, id: uptime_seconds, update_interval: 1min }
  - { platform: template, id: uptime_days, name: "$device_name uptime", update_interval: 1min, 
      device_class: duration, entity_category: "diagnostic", unit_of_measurement: "d", accuracy_decimals: 2,
      lambda: !lambda "return id(uptime_seconds).state / 86'400;"}

  - { platform: ntc, sensor: r_left, id: temp_left, name: "Temperature Left",
        calibration: [ 10.0kOhm -> 25°C, 27.219kOhm -> 0°C, 14.674kOhm -> 15°C ]  }
  - { platform: resistance, id: r_left, sensor: adc_left, configuration: DOWNSTREAM, resistor: 5.6kOhm }
  - { platform: adc, id: adc_left, pin: $left_ntc_pin, update_interval: 1s }
  - { platform: pid, climate_id: pid_left, name: "PID Left Result", type: RESULT }

  - { platform: ntc, sensor: r_right, id: temp_right, name: "Temperature Right",
        calibration: [ 10.0kOhm -> 25°C, 27.219kOhm -> 0°C, 14.674kOhm -> 15°C ]  }
  - { platform: resistance, id: r_right, sensor: adc_right, configuration: DOWNSTREAM, resistor: 5.6kOhm }
  - { platform: adc, id: adc_right, pin: $right_ntc_pin, update_interval: 1s }
  - { platform: pid, climate_id: pid_right, name: "PID Right Result", type: RESULT }

  - { platform: ntc, sensor: r_bottom, id: temp_bottom, name: "Temperature Bottom",
        calibration: [ 10.0kOhm -> 25°C, 27.219kOhm -> 0°C, 14.674kOhm -> 15°C ]  }
  - { platform: resistance, id: r_bottom, sensor: adc_bottom, configuration: DOWNSTREAM, resistor: 5.6kOhm }
  - { platform: adc, id: adc_bottom, pin: $bottom_ntc_pin, update_interval: 1s }
  - { platform: pid, climate_id: pid_bottom, name: "PID Bottom Result", type: RESULT }

