climate:
  - platform: pid
    id: pid_left
    name: "PID Left"
    sensor: temp_left
    default_target_temperature: 40°C
    heat_output: heater_left
    visual:
      min_temperature: 40
      max_temperature: 110
      temperature_step: 1
    control_parameters:
      kp: 0.49460
      ki: 0.00487
      kd: 12.56301
      output_averaging_samples: 5      # smooth the output over 5 samples
      derivative_averaging_samples: 10  # smooth the derivative value over 10 samples
    deadband_parameters:
      threshold_high: 1°C
      threshold_low: -2°C
