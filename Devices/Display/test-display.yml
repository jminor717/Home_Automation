  - platform: homeassistant
    id: bme_temp
    entity_id: sensor.bme280test_bme280_temperature_2


# --- LVGL ---
lvgl:

  displays:
    - main_display
  touchscreens:
    - my_touchscreen
  # bg_color : 0x000000
  # bg_image_src: dashboard_bg


  widgets:
    - label: { id: clock_label, text: "09:00",       align: CENTER, y: -60, text_font: roboto_bold_48}
    - label: { id: day_label,   text: "na",          align: CENTER, y: -20, text_font: opensans_24}
    - label: { id: date_label,  text: "28 december", align: CENTER, y: 0,   text_font: opensans_24}
    - label: { id: year_label,  text: "1997",        align: CENTER, y: 45,  text_font: roboto_bold_48}  #, text_color: 0x7B112C

    - textarea:
        id: textarea_id
        one_line: true
        placeholder_text: "Enter text here"
        on_focus:
          then:
            - lvgl.widget.show:
                id: keyboard_id
        on_defocus:
          then:
            - lvgl.widget.hide:
                id: keyboard_id

    - keyboard:
        id: keyboard_id
        textarea: textarea_id
        mode: TEXT_UPPER
        hidden: true
        on_ready:
          then:
            - logger.log: 
                level: INFO
                format: Keyboard is ready
            - lvgl.widget.hide:
                id: keyboard_id
        on_cancel:
          then:
            - logger.log: 
                level: INFO
                format: Keyboard cancelled
            - lvgl.widget.hide:
                id: keyboard_id

    # # Meteo - temperatură (font mare)
    # - label:
    #     id: weather_temp
    #     text: "0.0 °C"
    #     x: 70
    #     y: 80
    #     text_font: roboto_bold_48
    #     text_color: 0x7B112C

        
# --- Actualizare ceas + meteo ---
interval:
  - interval: 1s
    then:
      - lambda: |-
          auto t = id(ha_time).now();
          if (t.is_valid()) {
            // time
            char buf[6];
            sprintf(buf, "%02d:%02d", t.hour % 12, t.minute);
            lv_label_set_text(id(clock_label), buf);

            // day of week
            static const char* day[] = {"sunday","monday","tuesday","wednesday","thursday","friday","saturday"};
            int day_idx = t.day_of_week;
            if (day_idx < 1 || day_idx > 7) day_idx = 1;
            lv_label_set_text(id(day_label), day[day_idx - 1]);

            // month
            static const char* month[] = {"january","february","march","april","may","june","july","august","september","october","november","december"};
            int month_idx = t.month;
            if (month_idx < 1 || month_idx > 12) month_idx = 1;
            char buf2[24];
            sprintf(buf2, "%02d %s", t.day_of_month, month[month_idx - 1]);
            lv_label_set_text(id(date_label), buf2);

            // year
            char buf3[6];
            sprintf(buf3, "%04d", t.year);
            lv_label_set_text(id(year_label), buf3);
          }

          // // Temperatură exterioară
