esphome:
  name: sunton-esp32-8048s070
  friendly_name: sunton-esp32-8048s070
  platformio_options:
    build_flags: "-DBOARD_HAS_PSRAM"
    board_build.esp-idf.memory_type: qio_opi
    board_build.flash_mode: dio
    board_upload.maximum_ram_size: 524288

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  partitions: "default_16MB.csv"
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y
      CONFIG_ESP32S3_DATA_CACHE_64KB: y
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y


preferences:
  # the default of 1min is far too short--flash chip is rated for approx 100k writes.
  flash_write_interval: "240h"

api:
  # password: ""
ota:
  platform: esphome
  password: ""

logger:
  level: INFO
#   level: DEBUG

psram:
  mode: octal
  speed: 80MHz



wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Sunton-Esp32-8048S070"
    password: "12345678"

captive_portal:

# external_components:
#   - source:
#       type: git
#       url: https://github.com/clydebarrow/esphome
#       ref: dev
#     components: [lvgl]

output:
  - platform: ledc
    pin: 2
    frequency: 1220
    id: gpio_backlight_pwm

    
light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    id: back_light
    name: "Display Backlight"
    restore_mode: ALWAYS_ON
      
image:
  - file: images/dashboard_bg2.png
    id: dashboard_bg
    type: RGB565
    resize: 800x480

display:
  - platform: rpi_dpi_rgb
    id: main_display
    color_order: RGB
    invert_colors: true
    update_interval: 100ms
    dimensions:
      width: 800
      height: 480
    de_pin: 41
    hsync_pin: 39
    vsync_pin: 40
    pclk_pin: 42
    pclk_frequency: 12MHz
    hsync_front_porch: 210
    hsync_pulse_width: 30
    hsync_back_porch: 16
    vsync_front_porch: 22
    vsync_pulse_width: 13
    vsync_back_porch: 10
    data_pins:
      red: [14, 21, 47, 48, 45]
      green: [9, 46, 3, 8, 16, 1]
      blue: [15, 7, 6, 5, 4]

# --- Touchscreen ---
i2c:
  sda: 19
  scl: 20
  scan: true
  frequency: 400kHz

touchscreen:
  - platform: gt911
    id: my_touchscreen
    update_interval: 50ms
    on_touch:
      - lambda: |-
            ESP_LOGI("cal", "         x=%3d, y=%3d, x_raw=%3d, y_raw=%3d",
                touch.x,
                touch.y,
                touch.x_raw,
                touch.y_raw
                );
    on_update:
        - lambda: |-
              if (touches.size() == 1) {
                auto touch = touches[0];
                if (touch.state <= 2) {
                  ESP_LOGI("cal", "id=%5d x=%3d, y=%3d, x_raw=%3d, y_raw=%3d", touch.id, touch.x, touch.y, touch.x_raw, touch.y_raw);
                  auto brightness = touch.y / 480.0;

                  auto call = id(back_light).turn_on();
                  call.set_transition_length(0); // in ms
                  // set parameters (optional)
                  call.set_brightness(brightness); // 1.0 is full brightness

                  // perform action:
                  call.perform();

                }
              }
    on_release:
      then:
        - lambda: |-
              ESP_LOGI("cal", "Touch released");


